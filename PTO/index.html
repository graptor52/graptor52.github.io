<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Forecast</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C8BFA8; border-radius: 2px; }
    input, select {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      background: #FFFDF8;
      border: 1px solid #D8D0C0;
      border-radius: 4px;
      padding: 7px 10px;
      color: #1A1714;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus, select:focus { border-color: #8B6F47; box-shadow: 0 0 0 2px #8B6F4720; }
    label { font-family: 'Instrument Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #8B7D6B; display: block; margin-bottom: 4px; }
    .field { display: flex; flex-direction: column; }
    tr { transition: background 0.1s; }
    .trow:hover td { background: #EDE8DC !important; }
    .btn { font-family: 'Instrument Sans', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border: none; border-radius: 5px; padding: 10px 16px; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #8B6F47; color: #F5F0E8; }
    .btn-primary:hover:not(:disabled) { background: #7A5F38; }
    .btn-secondary { background: #EDE8DC; color: #4A3F30; }
    .btn-secondary:hover:not(:disabled) { background: #E0D8CC; }
    .panel { background: #FFFDF8; border: 1px solid #D8D0C0; border-radius: 8px; padding: 20px; }
    .panel-title { font-family: 'Instrument Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #8B7D6B; margin-bottom: 16px; }
    .error-msg { font-family: 'Instrument Sans', sans-serif; font-size: 11px; color: #CC4A1A; margin-top: 4px; }
    .success-msg { font-family: 'Instrument Sans', sans-serif; font-size: 11px; color: #4A8B6B; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const SUPABASE_URL = "https://ivxjtjutarmxolzyluwn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2eGp0anV0YXJteG9senlsdXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzAwOTcsImV4cCI6MjA4ODI0NjA5N30.GE0wZ5yqt8HejXur0LLWZBtZocy0IZIP7WDlWW_w1uQ";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Helpers ───────────────────────────────────────────────────────────────
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function parseLocalDate(str) { const [y,m,d] = str.split("-").map(Number); return new Date(y, m-1, d); }
    function toDateStr(d) { return d.toISOString().split("T")[0]; }
    function fmtDate(d) { return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
    function fmtDateShort(d) { return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
    function fmtHours(h) {
      if (h === null || h === undefined) return "—";
      const sign = h < 0 ? "-" : ""; const abs = Math.abs(h);
      const hrs = Math.floor(abs); const mins = Math.round((abs - hrs) * 60);
      return mins > 0 ? `${sign}${hrs}h ${mins}m` : `${sign}${hrs}h`;
    }
    function countWeekdays(start, end) {
      let count = 0, d = startOfDay(start); const e = startOfDay(end);
      while (d <= e) { const dow = d.getDay(); if (dow !== 0 && dow !== 6) count++; d = addDays(d, 1); }
      return count;
    }
    function generatePayDates(anchor, n) {
      return Array.from({ length: n }, (_, i) => addDays(anchor, i * 14));
    }
    function distributeHours(entry, payDates) {
      const start = startOfDay(entry.start), end = startOfDay(entry.end);
      const totalWd = countWeekdays(start, end);
      if (totalWd === 0) return {};
      const dist = {};
      payDates.forEach((pd, i) => {
        const pStart = i === 0 ? addDays(pd, -13) : addDays(payDates[i-1], 1);
        const oStart = start > pStart ? start : pStart;
        const oEnd = end < pd ? end : pd;
        if (oStart <= oEnd) { const wd = countWeekdays(oStart, oEnd); if (wd > 0) dist[i] = (dist[i] || 0) + (wd / totalWd) * entry.hours; }
      });
      return dist;
    }

    // ── Auth Screen ───────────────────────────────────────────────────────────
    function AuthScreen() {
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState(""), [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false), [error, setError] = useState(""), [msg, setMsg] = useState("");

      const submit = async () => {
        setError(""); setMsg(""); setLoading(true);
        if (mode === "login") {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) setError(error.message);
        } else if (mode === "signup") {
          const { error } = await sb.auth.signUp({ email, password });
          if (error) setError(error.message); else setMsg("Check your email to confirm, then sign in.");
        } else {
          const { error } = await sb.auth.resetPasswordForEmail(email);
          if (error) setError(error.message); else setMsg("Password reset email sent.");
        }
        setLoading(false);
      };

      const sw = (m) => { setMode(m); setError(""); setMsg(""); };

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Serif', Georgia, serif" }}>
          <div style={{ width: "100%", maxWidth: "400px", padding: "0 24px" }}>
            <div style={{ textAlign: "center", marginBottom: "36px" }}>
              <div style={{ height: "3px", background: "linear-gradient(90deg,#8B6F47,#C8A96E,#8B6F47)", marginBottom: "28px", borderRadius: "2px" }} />
              <h1 style={{ fontSize: "34px", fontWeight: 400, color: "#1A1714", letterSpacing: "-0.01em" }}>Vacation Forecast</h1>
              <p style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "13px", color: "#8B7D6B", marginTop: "8px" }}>
                {mode === "login" ? "Sign in to your account" : mode === "signup" ? "Create an account" : "Reset your password"}
              </p>
            </div>
            <div className="panel" style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
              <div className="field"><label>Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} placeholder="you@example.com" /></div>
              {mode !== "forgot" && <div className="field"><label>Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} placeholder="••••••••" /></div>}
              {error && <div className="error-msg">{error}</div>}
              {msg && <div className="success-msg">{msg}</div>}
              <button className="btn btn-primary" onClick={submit} disabled={loading} style={{ width: "100%" }}>
                {loading ? "Please wait…" : mode === "login" ? "Sign In" : mode === "signup" ? "Create Account" : "Send Reset Email"}
              </button>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'Instrument Sans', sans-serif", fontSize: "12px", color: "#8B7D6B" }}>
                {mode === "login" ? <>
                  <span style={{ cursor: "pointer", textDecoration: "underline" }} onClick={() => sw("signup")}>Create account</span>
                  <span style={{ cursor: "pointer", textDecoration: "underline" }} onClick={() => sw("forgot")}>Forgot password?</span>
                </> : <span style={{ cursor: "pointer", textDecoration: "underline" }} onClick={() => sw("login")}>Back to sign in</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Settings Modal ────────────────────────────────────────────────────────
    function SettingsModal({ settings, onSave, onClose, saving }) {
      const [f, setF] = useState({ ...settings });
      const [error, setError] = useState("");
      const upd = (k, v) => setF(p => ({ ...p, [k]: v }));

      const save = async () => {
        setError("");
        if (!f.balance_as_of || !f.anchor_date) { setError("All dates required."); return; }
        if (isNaN(+f.accrual_rate) || +f.accrual_rate <= 0) { setError("Accrual rate must be a positive number."); return; }
        if (isNaN(+f.initial_balance)) { setError("Balance must be a number."); return; }
        await onSave(f);
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "#1A171470", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: "24px" }}>
          <div className="panel" style={{ width: "100%", maxWidth: "460px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
              <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "10px", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#8B7D6B" }}>Your Settings</div>
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "22px", color: "#8B7D6B", lineHeight: 1 }}>×</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                <div className="field"><label>Current Balance (hrs)</label><input type="number" step="0.01" value={f.initial_balance} onChange={e => upd("initial_balance", e.target.value)} /></div>
                <div className="field"><label>Balance As Of</label><input type="date" value={f.balance_as_of} onChange={e => upd("balance_as_of", e.target.value)} /></div>
                <div className="field"><label>Accrual / Period (hrs)</label><input type="number" step="0.01" value={f.accrual_rate} onChange={e => upd("accrual_rate", e.target.value)} /></div>
                <div className="field"><label>Accrual Cap (0 = none)</label><input type="number" step="1" min="0" value={f.accrual_cap} onChange={e => upd("accrual_cap", e.target.value)} /></div>
              </div>
              <div className="field">
                <label>Next Posting Date</label>
                <input type="date" value={f.anchor_date} onChange={e => upd("anchor_date", e.target.value)} />
                <span style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "11px", color: "#8B7D6B", marginTop: "4px" }}>The next date hours will post to your balance (then every 14 days)</span>
              </div>
              {error && <div className="error-msg">{error}</div>}
              <div style={{ display: "flex", gap: "10px" }}>
                <button className="btn btn-primary" onClick={save} disabled={saving} style={{ flex: 1 }}>{saving ? "Saving…" : "Save Settings"}</button>
                <button className="btn btn-secondary" onClick={onClose} style={{ flex: 1 }}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [settings, setSettings] = useState(null);
      const [entries, setEntries] = useState([]);
      const [dataLoading, setDataLoading] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [settingsSaving, setSettingsSaving] = useState(false);
      const [form, setForm] = useState({ start: "", end: "", hours: "" });
      const [formError, setFormError] = useState("");
      const [monthsToShow, setMonthsToShow] = useState(12);
      const PERIODS = 54;
      const todayStr = toDateStr(new Date());

      useEffect(() => {
        sb.auth.getSession().then(({ data }) => { setSession(data.session); setAuthLoading(false); });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (!session) { setSettings(null); setEntries([]); return; }
        loadData();
      }, [session]);

      const loadData = async () => {
        setDataLoading(true);
        const uid = session.user.id;
        const { data: profile } = await sb.from("users").select("*").eq("id", uid).single();
        if (profile) {
          setSettings(profile);
        } else {
          setSettings({ accrual_rate: 3.08, initial_balance: 0, balance_as_of: todayStr, accrual_cap: 0, anchor_date: todayStr });
          setShowSettings(true);
        }
        const { data: rows } = await sb.from("entries").select("*").eq("user_id", uid).order("start_date");
        if (rows) setEntries(rows.map(r => ({ id: r.id, start: parseLocalDate(r.start_date), end: parseLocalDate(r.end_date), hours: r.hours })));
        setDataLoading(false);
      };

      const saveSettings = async (form) => {
        setSettingsSaving(true);
        const payload = { id: session.user.id, accrual_rate: +form.accrual_rate, initial_balance: +form.initial_balance, balance_as_of: form.balance_as_of, accrual_cap: +form.accrual_cap, anchor_date: form.anchor_date };
        const { error } = await sb.from("users").upsert(payload);
        if (!error) { setSettings(payload); setShowSettings(false); }
        setSettingsSaving(false);
      };

      const addEntry = async () => {
        setFormError("");
        if (!form.start || !form.end || !form.hours) { setFormError("All fields required."); return; }
        const s = parseLocalDate(form.start), e = parseLocalDate(form.end);
        if (e < s) { setFormError("End must be on or after start."); return; }
        const h = parseFloat(form.hours);
        if (isNaN(h) || h <= 0) { setFormError("Hours must be positive."); return; }
        const { data, error } = await sb.from("entries").insert({ user_id: session.user.id, start_date: toDateStr(s), end_date: toDateStr(e), hours: h }).select().single();
        if (!error && data) { setEntries(prev => [...prev, { id: data.id, start: s, end: e, hours: h }]); setForm({ start: "", end: "", hours: "" }); }
      };

      const removeEntry = async (id) => {
        await sb.from("entries").delete().eq("id", id);
        setEntries(prev => prev.filter(e => e.id !== id));
      };

      const anchorDate = settings ? parseLocalDate(settings.anchor_date) : new Date();
      const payDates = useMemo(() => generatePayDates(anchorDate, PERIODS), [settings?.anchor_date]);

      const cutoffDate = useMemo(() => { const d = new Date(anchorDate); d.setMonth(d.getMonth() + monthsToShow); return d; }, [monthsToShow, settings?.anchor_date]);
      const visiblePeriods = useMemo(() => payDates.filter(pd => pd <= cutoffDate).length, [payDates, cutoffDate]);

      const usageByPeriod = useMemo(() => {
        const map = {};
        entries.forEach(e => { const dist = distributeHours(e, payDates); Object.entries(dist).forEach(([i, h]) => { map[i] = (map[i] || 0) + h; }); });
        return map;
      }, [entries, payDates]);

      const periods = useMemo(() => {
        if (!settings) return [];
        let bal = +settings.initial_balance;
        const cap = +settings.accrual_cap;
        return payDates.slice(0, visiblePeriods).map((pd, i) => {
          const used = usageByPeriod[i] || 0;
          bal = bal + +settings.accrual_rate - used;
          if (cap > 0) bal = Math.min(bal, cap);
          return { i, date: pd, accrued: +settings.accrual_rate, used: Math.round(used * 100) / 100, balance: Math.round(bal * 100) / 100 };
        });
      }, [visiblePeriods, usageByPeriod, settings]);

      const initBal = settings ? +settings.initial_balance : 0;
      const chartMax = Math.max(...periods.map(p => p.balance), initBal) * 1.15 || 100;
      const chartMin = Math.min(0, ...periods.map(p => p.balance));
      const chartRange = chartMax - chartMin || 1;
      const W = 560, H = 110;
      const toX = i => (i / (periods.length - 1 || 1)) * W;
      const toY = v => H - ((v - chartMin) / chartRange) * H;
      const linePath = periods.map((p, i) => `${i === 0 ? "M" : "L"}${toX(i).toFixed(1)},${toY(p.balance).toFixed(1)}`).join(" ");
      const fillPath = linePath + ` L${W},${toY(0)} L0,${toY(0)} Z`;

      const monthLabels = useMemo(() => {
        const labels = []; let last = -1;
        periods.forEach((p, i) => { const m = p.date.getMonth(); if (m !== last) { last = m; labels.push({ i, label: p.date.toLocaleDateString("en-US", { month: "short", year: "2-digit" }) }); } });
        return labels;
      }, [periods]);

      const totalPlanned = entries.reduce((s, e) => s + e.hours, 0);
      const finalBal = periods.length > 0 ? periods[periods.length - 1].balance : initBal;
      const negPeriods = periods.filter(p => p.balance < 0).length;

      const preview = (() => {
        if (!form.start || !form.end || !form.hours) return null;
        const s = parseLocalDate(form.start), e = parseLocalDate(form.end);
        const wd = countWeekdays(s, e); const h = parseFloat(form.hours);
        return (wd > 0 && !isNaN(h) && h > 0) ? { wd, hpd: (h / wd).toFixed(1) } : null;
      })();

      if (authLoading) return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Sans', sans-serif", color: "#8B7D6B" }}>Loading…</div>
      );
      if (!session) return <AuthScreen />;

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", fontFamily: "'Instrument Serif', Georgia, serif", color: "#1A1714" }}>
          <div style={{ height: "4px", background: "linear-gradient(90deg,#8B6F47,#C8A96E,#8B6F47)" }} />
          {showSettings && settings && <SettingsModal settings={settings} onSave={saveSettings} onClose={() => setShowSettings(false)} saving={settingsSaving} />}

          <div style={{ maxWidth: "1100px", margin: "0 auto", padding: "40px 32px" }}>
            {/* Header */}
            <div style={{ marginBottom: "40px", borderBottom: "1px solid #C8BFA8", paddingBottom: "24px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
                <div>
                  <h1 style={{ fontSize: "38px", fontWeight: 400, lineHeight: 1, letterSpacing: "-0.01em" }}>Vacation Forecast</h1>
                  {settings && <p style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "13px", color: "#8B7D6B", marginTop: "6px" }}>
                    {settings.accrual_rate}h / bi-weekly · posts every other Saturday{+settings.accrual_cap > 0 ? ` · cap ${settings.accrual_cap}h` : ""}
                  </p>}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    <span style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "13px", color: "#8B7D6B" }}>Show</span>
                    <select value={monthsToShow} onChange={e => setMonthsToShow(+e.target.value)} style={{ width: "auto", padding: "4px 8px" }}>
                      {[6,12,18,24].map(m => <option key={m} value={m}>{m} months</option>)}
                    </select>
                  </div>
                  <button className="btn btn-secondary" onClick={() => setShowSettings(true)} style={{ padding: "7px 14px" }}>⚙ Settings</button>
                  <button className="btn btn-secondary" onClick={() => sb.auth.signOut()} style={{ padding: "7px 14px" }}>Sign Out</button>
                </div>
              </div>
            </div>

            {dataLoading ? (
              <div style={{ fontFamily: "'Instrument Sans', sans-serif", color: "#8B7D6B", fontSize: "13px" }}>Loading your data…</div>
            ) : !settings ? null : (<>

              {/* Stats */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "16px", marginBottom: "32px" }}>
                {[
                  { label: "Current Balance", value: fmtHours(initBal), sub: `as of ${fmtDate(parseLocalDate(settings.balance_as_of))}`, warn: false },
                  { label: "Projected Balance", value: fmtHours(finalBal), sub: `in ${monthsToShow} months`, warn: finalBal < 0 },
                  { label: "Planned Time Off", value: fmtHours(totalPlanned), sub: `${entries.length} entr${entries.length === 1 ? "y" : "ies"}`, warn: false },
                  { label: "Periods in Deficit", value: negPeriods, sub: negPeriods > 0 ? "⚠ balance goes negative" : "all clear", warn: negPeriods > 0 },
                ].map(s => (
                  <div key={s.label} style={{ background: s.warn ? "#FFF0E8" : "#FFFDF8", border: `1px solid ${s.warn ? "#E8A87C" : "#D8D0C0"}`, borderRadius: "8px", padding: "16px 18px" }}>
                    <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "10px", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: s.warn ? "#B05A20" : "#8B7D6B", marginBottom: "6px" }}>{s.label}</div>
                    <div style={{ fontSize: "26px", color: s.warn ? "#B05A20" : "#1A1714", lineHeight: 1 }}>{s.value}</div>
                    <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "11px", color: s.warn ? "#B05A20" : "#A89880", marginTop: "4px" }}>{s.sub}</div>
                  </div>
                ))}
              </div>

              {/* Chart */}
              <div className="panel" style={{ marginBottom: "32px", padding: "24px 24px 16px" }}>
                <div className="panel-title">Balance Over Time</div>
                <svg width="100%" viewBox={`0 0 ${W} ${H+24}`} style={{ overflow: "visible", display: "block" }}>
                  <defs>
                    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#8B6F47" stopOpacity="0.18" />
                      <stop offset="100%" stopColor="#8B6F47" stopOpacity="0.02" />
                    </linearGradient>
                  </defs>
                  {[0.25,0.5,0.75,1].map(f => { const v = chartMin + chartRange*f; return <g key={f}>
                    <line x1={0} x2={W} y1={toY(v)} y2={toY(v)} stroke="#E8E0D0" strokeWidth="1" />
                    <text x={W+8} y={toY(v)+4} fill="#B0A090" fontSize="9" fontFamily="Instrument Sans">{Math.round(v)}h</text>
                  </g>; })}
                  {chartMin < 0 && <line x1={0} x2={W} y1={toY(0)} y2={toY(0)} stroke="#CC4A1A" strokeWidth="1" strokeDasharray="4 3" opacity="0.5" />}
                  <path d={fillPath} fill="url(#fillGrad)" />
                  <path d={linePath} fill="none" stroke="#8B6F47" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                  {periods.filter(p => p.used > 0).map(p => <circle key={p.i} cx={toX(p.i)} cy={toY(p.balance)} r="4" fill="#8B6F47" stroke="#F5F0E8" strokeWidth="2" />)}
                  {monthLabels.map(l => <text key={l.i} x={toX(l.i)} y={H+20} fill="#B0A090" fontSize="9" fontFamily="Instrument Sans" textAnchor="middle">{l.label}</text>)}
                </svg>
              </div>

              {/* Bottom grid */}
              <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: "24px", alignItems: "start" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
                  <div className="panel">
                    <div className="panel-title">Add Planned Time Off</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                        <div className="field"><label>Start Date</label><input type="date" value={form.start} min={todayStr} onChange={e => setForm(f => ({ ...f, start: e.target.value }))} /></div>
                        <div className="field"><label>End Date</label><input type="date" value={form.end} min={form.start || todayStr} onChange={e => setForm(f => ({ ...f, end: e.target.value }))} /></div>
                      </div>
                      <div className="field"><label>Total Hours to Use</label>
                        <input type="number" min="1" step="0.5" placeholder="e.g. 40" value={form.hours}
                          onChange={e => setForm(f => ({ ...f, hours: e.target.value }))}
                          onKeyDown={e => e.key === "Enter" && addEntry()} />
                      </div>
                      {preview && <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "11px", color: "#8B7D6B", background: "#F0EBE0", borderRadius: "4px", padding: "8px 10px" }}>
                        {preview.wd} weekday{preview.wd !== 1 ? "s" : ""} · ~{preview.hpd}h/day · split across pay periods
                      </div>}
                      {formError && <div className="error-msg">{formError}</div>}
                      <button className="btn btn-primary" onClick={addEntry}>Add Entry</button>
                    </div>
                  </div>

                  {entries.length > 0 && <div className="panel">
                    <div className="panel-title">Planned Entries</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                      {entries.map(e => (
                        <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", background: "#F5F0E8", borderRadius: "5px" }}>
                          <div>
                            <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "12px", color: "#1A1714", fontWeight: 500 }}>
                              {fmtDateShort(e.start)}{e.start.toDateString() !== e.end.toDateString() ? ` – ${fmtDateShort(e.end)}` : ""}
                            </div>
                            <div style={{ fontFamily: "'Instrument Sans', sans-serif", fontSize: "11px", color: "#8B7D6B" }}>{fmtHours(e.hours)} · {countWeekdays(e.start, e.end)} weekdays</div>
                          </div>
                          <button onClick={() => removeEntry(e.id)} style={{ background: "none", border: "none", color: "#B0A090", cursor: "pointer", fontSize: "20px", lineHeight: 1, padding: "0 4px" }}
                            onMouseEnter={ev => ev.target.style.color = "#CC4A1A"}
                            onMouseLeave={ev => ev.target.style.color = "#B0A090"}>×</button>
                        </div>
                      ))}
                    </div>
                  </div>}
                </div>

                <div className="panel" style={{ padding: 0, overflow: "hidden" }}>
                  <div style={{ padding: "14px 20px", borderBottom: "1px solid #E8E0D0" }} className="panel-title">Pay Period Detail</div>
                  <div style={{ overflowY: "auto", maxHeight: "520px" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse" }}>
                      <thead>
                        <tr style={{ position: "sticky", top: 0, background: "#F5F0E8", zIndex: 1 }}>
                          {["Posts On","Accrued","Used","Balance"].map(h => (
                            <th key={h} style={{ padding: "10px 16px", textAlign: h === "Posts On" ? "left" : "right", fontFamily: "'Instrument Sans', sans-serif", fontSize: "10px", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "#8B7D6B", borderBottom: "1px solid #D8D0C0", whiteSpace: "nowrap" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {periods.map((p, i) => (
                          <tr key={i} className="trow" style={{ borderBottom: "1px solid #EDE8DC" }}>
                            <td style={{ padding: "9px 16px", fontFamily: "'Instrument Sans', sans-serif", fontSize: "12px", color: "#4A3F30", whiteSpace: "nowrap" }}>
                              {fmtDate(p.date)}
                              {p.used > 0 && <span style={{ marginLeft: "6px", fontSize: "9px", color: "#8B6F47", background: "#EDE0CC", borderRadius: "3px", padding: "1px 5px", fontWeight: 600, letterSpacing: "0.05em" }}>TIME OFF</span>}
                            </td>
                            <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'Instrument Sans', sans-serif", fontSize: "12px", color: "#6B8B6B" }}>+{fmtHours(p.accrued)}</td>
                            <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'Instrument Sans', sans-serif", fontSize: "12px", color: p.used > 0 ? "#8B6F47" : "#C8BFA8" }}>{p.used > 0 ? `−${fmtHours(p.used)}` : "—"}</td>
                            <td style={{ padding: "9px 16px", textAlign: "right", fontFamily: "'Instrument Sans', sans-serif", fontSize: "13px", fontWeight: 600, color: p.balance < 0 ? "#CC4A1A" : "#1A1714" }}>{fmtHours(p.balance)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </>)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

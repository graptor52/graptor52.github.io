// ── Pure helpers ──────────────────────────────────────────────────────────────
const addDays    = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const floorDay   = (d)    => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const parseDate  = (s)    => { const [y,m,d] = s.split("-").map(Number); return new Date(y,m-1,d); };
const toISO      = (d)    => d.toISOString().split("T")[0];
const fmtDate    = (d)    => d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
const fmtShort   = (d)    => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });

function fmtHrs(h) {
  if (h == null) return "—";
  const sign = h < 0 ? "-" : "", abs = Math.abs(h);
  const hrs = Math.floor(abs), mins = Math.round((abs - hrs) * 60);
  return mins ? `${sign}${hrs}h ${mins}m` : `${sign}${hrs}h`;
}

function weekdays(a, b) {
  let n = 0, d = floorDay(a), e = floorDay(b);
  while (d <= e) { const w = d.getDay(); if (w && w < 6) n++; d = addDays(d,1); }
  return n;
}

// Generate pay dates: anchor + every 14 days, N periods total
function makePayDates(anchor, n) {
  return Array.from({length: n}, (_, i) => addDays(anchor, i * 14));
}

// Distribute entry hours across pay periods by weekday overlap
function distribute(entry, payDates) {
  const s = floorDay(entry.start), e = floorDay(entry.end);
  const totalWd = weekdays(s, e);
  if (!totalWd) return {};
  const out = {};
  payDates.forEach((pd, i) => {
    const pStart = i === 0 ? addDays(pd, -13) : addDays(payDates[i-1], 1);
    const os = s > pStart ? s : pStart;
    const oe = e < pd    ? e : pd;
    if (os <= oe) {
      const wd = weekdays(os, oe);
      if (wd) out[i] = (out[i] || 0) + (wd / totalWd) * entry.hours;
    }
  });
  return out;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function Chart({ periods, chartYear, setChartYear, allYears }) {
  const [hovered, setHovered] = useState(null);

  const yearPeriods = useMemo(
    () => periods.filter(p => p.date.getFullYear() === chartYear),
    [periods, chartYear]
  );

  // Chart geometry
  const PL=10, PR=52, PT=8, PB=32, W=580, H=120;
  const IW = W - PL - PR, IH = H - PT;

  // X: proportional across Jan 1 – Dec 31 of chartYear
  const yearMs0 = new Date(chartYear, 0, 1).getTime();
  const yearMs1 = new Date(chartYear, 11, 31).getTime();
  const toX = d => PL + ((d.getTime() - yearMs0) / (yearMs1 - yearMs0)) * IW;

  // Y axis: nice multiples of 25 spanning the year's data
  const balances = yearPeriods.map(p => p.balance);
  const rawMax = balances.length ? Math.max(...balances) : 100;
  const rawMin = balances.length ? Math.min(0, ...balances) : 0;
  const yStep = 25;
  const yTop  = Math.ceil(rawMax / yStep) * yStep;
  const yBot  = Math.floor(rawMin / yStep) * yStep;
  const yRange = yTop - yBot || yStep;
  const toY = v => PT + IH - ((v - yBot) / yRange) * IH;

  const gridLines = [];
  for (let v = yBot; v <= yTop; v += yStep) gridLines.push(v);

  // Line + fill paths
  const linePath = yearPeriods.map((p,i) =>
    `${i===0?"M":"L"}${toX(p.date).toFixed(1)},${toY(p.balance).toFixed(1)}`
  ).join(" ");
  const fillPath = yearPeriods.length > 1
    ? `${linePath} L${toX(yearPeriods[yearPeriods.length-1].date).toFixed(1)},${toY(0).toFixed(1)} L${toX(yearPeriods[0].date).toFixed(1)},${toY(0).toFixed(1)} Z`
    : "";

  // Month labels: one per month, positioned by date
  const monthLabels = Array.from({length:12}, (_,m) => {
    const d = new Date(chartYear, m, 1);
    return { x: toX(d), label: d.toLocaleDateString("en-US",{month:"short"}) };
  });

  const prevYear = allYears[allYears.indexOf(chartYear) - 1];
  const nextYear = allYears[allYears.indexOf(chartYear) + 1];

  // Tooltip
  const hov = hovered != null ? periods.find(p => p.i === hovered) : null;

  return (
    <div className="panel" style={{marginBottom:32}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 0"}}>
        <span className="panel-title">Balance Over Time</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>prevYear&&setChartYear(prevYear)} disabled={!prevYear}
            className="btn btn-secondary" style={{padding:"4px 12px",fontSize:16,lineHeight:1}}>‹</button>
          <span className="sans" style={{fontSize:13,fontWeight:600,color:"#4A3F30",minWidth:36,textAlign:"center"}}>{chartYear}</span>
          <button onClick={()=>nextYear&&setChartYear(nextYear)} disabled={!nextYear}
            className="btn btn-secondary" style={{padding:"4px 12px",fontSize:16,lineHeight:1}}>›</button>
        </div>
      </div>
      <div style={{padding:"12px 20px 16px"}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H+PB}`} style={{display:"block",overflow:"visible"}}>
          <defs>
            <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#8B6F47" stopOpacity="0.16"/>
              <stop offset="100%" stopColor="#8B6F47" stopOpacity="0.01"/>
            </linearGradient>
            <clipPath id="cc">
              <rect x={PL} y={PT} width={IW} height={IH+2}/>
            </clipPath>
          </defs>

          {/* Grid lines + Y labels */}
          {gridLines.map(v => (
            <g key={v}>
              <line x1={PL} x2={PL+IW} y1={toY(v)} y2={toY(v)} stroke="#E8E0D0" strokeWidth="1"/>
              <text x={PL+IW+7} y={toY(v)} fill="#B0A090" fontSize="9" fontFamily="Instrument Sans"
                dominantBaseline="middle" textAnchor="start">{v}h</text>
            </g>
          ))}

          {/* Zero line if chart goes negative */}
          {yBot < 0 && (
            <line x1={PL} x2={PL+IW} y1={toY(0)} y2={toY(0)}
              stroke="#CC4A1A" strokeWidth="1" strokeDasharray="4 3" opacity="0.6"/>
          )}

          {/* Fill + line */}
          <g clipPath="url(#cc)">
            {fillPath && <path d={fillPath} fill="url(#fg)"/>}
            {linePath && <path d={linePath} fill="none" stroke="#8B6F47" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>}
          </g>

          {/* Dots */}
          {yearPeriods.map(p => {
            const cx = toX(p.date), cy = toY(p.balance);
            const isHov = hovered === p.i, hasUse = p.used > 0;
            return (
              <circle key={p.i} cx={cx} cy={cy}
                r={isHov ? 6 : hasUse ? 4.5 : 3.5}
                fill={hasUse ? "#CC4A1A" : "#8B6F47"}
                stroke="#FFFDF8" strokeWidth={isHov ? 2 : 1.5}
                style={{cursor:"pointer"}}
                onMouseEnter={() => setHovered(p.i)}
                onMouseLeave={() => setHovered(null)}
              />
            );
          })}

          {/* Tooltip */}
          {hov && (() => {
            const cx = toX(hov.date), cy = toY(hov.balance);
            const lines = [fmtDate(hov.date), fmtHrs(hov.balance)];
            if (hov.used > 0) lines.push(`−${fmtHrs(hov.used)} used`);
            const TW = 124, TH = lines.length * 17 + 12;
            const tx = cx + TW + 14 > PL+IW ? cx - TW - 8 : cx + 8;
            const ty = Math.max(PT, Math.min(cy - TH/2, H - TH));
            return (
              <g pointerEvents="none">
                <rect x={tx} y={ty} width={TW} height={TH} rx="4" fill="#1A1714" opacity="0.88"/>
                {lines.map((l,li) => (
                  <text key={li} x={tx+9} y={ty+14+li*17}
                    fill={li===2?"#FF9070":li===1?"#C8A96E":"#F5F0E8"}
                    fontSize="10" fontFamily="Instrument Sans"
                    fontWeight={li===0?"400":"600"}>{l}</text>
                ))}
              </g>
            );
          })()}

          {/* X axis month labels */}
          {monthLabels.map((l,mi) => (
            <text key={mi} x={l.x} y={H+PB-6} fill="#B0A090" fontSize="9"
              fontFamily="Instrument Sans" textAnchor="middle">{l.label}</text>
          ))}
        </svg>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [session,     setSession]     = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [settings,    setSettings]    = useState(null);
  const [entries,     setEntries]     = useState([]);
  const [dataLoading, setDataLoading] = useState(false);
  const [showSettings,setShowSettings]= useState(false);
  const [settingsBusy,setSettingsBusy]= useState(false);
  const [chartYear,   setChartYear]   = useState(new Date().getFullYear());
  const [tableMaxYear,setTableMaxYear]= useState(new Date().getFullYear());
  const [form,        setForm]        = useState({start:"",end:"",hours:""});
  const [formErr,     setFormErr]     = useState("");
  const todayStr = toISO(new Date());

  // Auth
  useEffect(() => {
    sb.auth.getSession().then(({data}) => { setSession(data.session); setAuthLoading(false); });
    const { data:{subscription} } = sb.auth.onAuthStateChange((_,s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setSettings(null); setEntries([]); return; }
    loadData();
  }, [session]);

  const loadData = async () => {
    setDataLoading(true);
    const uid = session.user.id;
    const { data: profile } = await sb.from("users").select("*").eq("id",uid).single();
    if (profile) {
      setSettings(profile);
    } else {
      const defaults = { accrual_rate:3.08, initial_balance:0, balance_as_of:todayStr, accrual_cap:0, anchor_date:todayStr };
      setSettings(defaults);
      setShowSettings(true);
    }
    const { data: rows } = await sb.from("entries").select("*").eq("user_id",uid).order("start_date");
    setEntries((rows||[]).map(r => ({ id:r.id, start:parseDate(r.start_date), end:parseDate(r.end_date), hours:r.hours })));
    setDataLoading(false);
  };

  const saveSettings = async (f) => {
    setSettingsBusy(true);
    const payload = { id:session.user.id, accrual_rate:+f.accrual_rate, initial_balance:+f.initial_balance,
      balance_as_of:f.balance_as_of, accrual_cap:+f.accrual_cap, anchor_date:f.anchor_date };
    const { error } = await sb.from("users").upsert(payload);
    if (!error) { setSettings(payload); setShowSettings(false); }
    setSettingsBusy(false);
  };

  const addEntry = async () => {
    setFormErr("");
    if (!form.start||!form.end||!form.hours) { setFormErr("All fields required."); return; }
    const s = parseDate(form.start), e = parseDate(form.end);
    if (e < s) { setFormErr("End must be on or after start."); return; }
    const h = parseFloat(form.hours);
    if (isNaN(h)||h<=0) { setFormErr("Hours must be positive."); return; }
    const { data, error } = await sb.from("entries")
      .insert({ user_id:session.user.id, start_date:toISO(s), end_date:toISO(e), hours:h })
      .select().single();
    if (!error && data) {
      setEntries(prev => [...prev, { id:data.id, start:s, end:e, hours:h }]);
      setForm({start:"",end:"",hours:""});
    }
  };

  const removeEntry = async (id) => {
    await sb.from("entries").delete().eq("id",id);
    setEntries(prev => prev.filter(e => e.id !== id));
  };

  // ── Forecast computation ──────────────────────────────────────────────────
  // Generate ~5 years of pay dates from anchor
  const anchorDate = settings ? parseDate(settings.anchor_date) : new Date();

  const payDates = useMemo(
    () => makePayDates(anchorDate, 130),
    [settings?.anchor_date]
  );

  // Usage distributed across pay periods
  const usageMap = useMemo(() => {
    const m = {};
    entries.forEach(e => {
      Object.entries(distribute(e, payDates)).forEach(([i,h]) => { m[i] = (m[i]||0) + h; });
    });
    return m;
  }, [entries, payDates]);

  // Full period array with running balance
  const periods = useMemo(() => {
    if (!settings) return [];
    let bal = +settings.initial_balance;
    const rate = +settings.accrual_rate;
    const cap  = +settings.accrual_cap;
    // First figure out how many periods elapsed between balance_as_of and anchor
    // so we start the running balance at the right point.
    // We treat settings.initial_balance as the balance on settings.balance_as_of.
    // payDates[0] = anchor (first FUTURE posting date).
    // Any payDates that fall on or before balance_as_of have already been accounted for in initial_balance,
    // so we just run forward from there.
    return payDates.map((pd, i) => {
      const used = usageMap[i] || 0;
      bal = bal + rate - used;
      if (cap > 0) bal = Math.min(bal, cap);
      return { i, date: pd, accrued: rate, used: Math.round(used*100)/100, balance: Math.round(bal*100)/100 };
    });
  }, [settings, payDates, usageMap]);

  // All years that have data
  const allYears = useMemo(() => {
    const ys = new Set(periods.map(p => p.date.getFullYear()));
    return Array.from(ys).sort((a,b) => a-b);
  }, [periods]);

  // Current balance: last period that has already posted (date ≤ today)
  const today = floorDay(new Date());
  const postedPeriods = periods.filter(p => floorDay(p.date) <= today);
  const currentPeriod = postedPeriods[postedPeriods.length - 1];
  // If no period has posted yet, use the raw initial balance
  const currentBal  = currentPeriod ? currentPeriod.balance : (settings ? +settings.initial_balance : 0);
  const currentDate = currentPeriod ? currentPeriod.date    : (settings ? parseDate(settings.balance_as_of) : new Date());

  // Projected: 12 months from today
  const twelveOut = new Date(); twelveOut.setMonth(twelveOut.getMonth() + 12);
  const proj12Periods = periods.filter(p => p.date <= twelveOut);
  const projBal = proj12Periods.length ? proj12Periods[proj12Periods.length-1].balance
                                       : (settings ? +settings.initial_balance : 0);

  // Totals
  const totalPlanned = entries.reduce((s,e) => s+e.hours, 0);
  const negPeriods   = periods.filter(p => p.balance < 0).length;

  // Table: show periods up through end of tableMaxYear
  const tablePeriods = periods.filter(p => p.date.getFullYear() <= tableMaxYear);
  const nextTableYear = tableMaxYear + 1;
  const hasNextYear   = allYears.includes(nextTableYear);

  // Form preview
  const preview = (() => {
    if (!form.start||!form.end||!form.hours) return null;
    const s = parseDate(form.start), e = parseDate(form.end);
    const wd = weekdays(s,e); const h = parseFloat(form.hours);
    return (wd>0&&!isNaN(h)&&h>0) ? {wd, hpd:(h/wd).toFixed(1)} : null;
  })();

  // ── Render ────────────────────────────────────────────────────────────────
  if (authLoading) return (
    <div className="sans" style={{minHeight:"100vh",background:"#F5F0E8",display:"flex",alignItems:"center",justifyContent:"center",color:"#8B7D6B"}}>
      Loading…
    </div>
  );
  if (!session) return <AuthScreen/>;

  return (
    <div style={{minHeight:"100vh",background:"#F5F0E8"}}>
      <div style={{height:4,background:"linear-gradient(90deg,#8B6F47,#C8A96E,#8B6F47)"}}/>
      {showSettings && settings && (
        <SettingsModal init={settings} onSave={saveSettings} onClose={()=>setShowSettings(false)} busy={settingsBusy}/>
      )}

      <div style={{maxWidth:1100,margin:"0 auto",padding:"40px 32px"}}>

        {/* Header */}
        <div style={{marginBottom:40,borderBottom:"1px solid #C8BFA8",paddingBottom:24,
          display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <h1 style={{fontSize:38,fontWeight:400,letterSpacing:"-0.01em",lineHeight:1}}>Vacation Forecast</h1>
            {settings && <p className="sans" style={{fontSize:13,color:"#8B7D6B",marginTop:6}}>
              {settings.accrual_rate}h / bi-weekly · posts every other Saturday
              {+settings.accrual_cap>0?` · cap ${settings.accrual_cap}h`:""}
            </p>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-secondary" onClick={()=>setShowSettings(true)} style={{padding:"7px 14px"}}>⚙ Settings</button>
            <button className="btn btn-secondary" onClick={()=>sb.auth.signOut()} style={{padding:"7px 14px"}}>Sign Out</button>
          </div>
        </div>

        {dataLoading ? (
          <div className="sans" style={{color:"#8B7D6B",fontSize:13}}>Loading your data…</div>
        ) : !settings ? null : (<>

          {/* Stat cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
            {[
              { label:"Current Balance",   value:fmtHrs(currentBal),  sub:`as of ${fmtDate(currentDate)}`,  warn:false },
              { label:"Projected Balance", value:fmtHrs(projBal),     sub:"in 12 months",                   warn:projBal<0 },
              { label:"Planned Time Off",  value:fmtHrs(totalPlanned),sub:`${entries.length} entr${entries.length===1?"y":"ies"}`, warn:false },
              { label:"Periods in Deficit",value:negPeriods,          sub:negPeriods>0?"⚠ goes negative":"all clear", warn:negPeriods>0 },
            ].map(s => (
              <div key={s.label} style={{
                background:s.warn?"#FFF0E8":"#FFFDF8",
                border:`1px solid ${s.warn?"#E8A87C":"#D8D0C0"}`,
                borderRadius:8, padding:"16px 18px"
              }}>
                <div className="sans" style={{fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",
                  color:s.warn?"#B05A20":"#8B7D6B",marginBottom:6}}>{s.label}</div>
                <div style={{fontSize:26,color:s.warn?"#B05A20":"#1A1714",lineHeight:1}}>{s.value}</div>
                <div className="sans" style={{fontSize:11,color:s.warn?"#B05A20":"#A89880",marginTop:4}}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* Chart */}
          <Chart periods={periods} chartYear={chartYear} setChartYear={setChartYear} allYears={allYears}/>

          {/* Bottom grid */}
          <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:24,alignItems:"start"}}>

            {/* Left: add entry + entries list */}
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div className="panel panel-body">
                <div className="panel-title" style={{marginBottom:16}}>Add Planned Time Off</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div className="field"><label>Start</label>
                      <input type="date" value={form.start} min={todayStr} onChange={e=>setForm(f=>({...f,start:e.target.value}))}/>
                    </div>
                    <div className="field"><label>End</label>
                      <input type="date" value={form.end} min={form.start||todayStr} onChange={e=>setForm(f=>({...f,end:e.target.value}))}/>
                    </div>
                  </div>
                  <div className="field"><label>Total Hours</label>
                    <input type="number" min="1" step="0.5" placeholder="e.g. 40" value={form.hours}
                      onChange={e=>setForm(f=>({...f,hours:e.target.value}))}
                      onKeyDown={e=>e.key==="Enter"&&addEntry()}/>
                  </div>
                  {preview && (
                    <div className="sans" style={{fontSize:11,color:"#8B7D6B",background:"#F0EBE0",borderRadius:4,padding:"8px 10px"}}>
                      {preview.wd} weekday{preview.wd!==1?"s":""} · ~{preview.hpd}h/day · split across pay periods
                    </div>
                  )}
                  {formErr && <div className="err">{formErr}</div>}
                  <button className="btn btn-primary" onClick={addEntry} style={{width:"100%"}}>Add Entry</button>
                </div>
              </div>

              {entries.length > 0 && (
                <div className="panel panel-body">
                  <div className="panel-title" style={{marginBottom:12}}>Planned Entries</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {entries.map(e => (
                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 10px",background:"#F5F0E8",borderRadius:5}}>
                        <div>
                          <div className="sans" style={{fontSize:12,fontWeight:500,color:"#1A1714"}}>
                            {fmtShort(e.start)}{e.start.toDateString()!==e.end.toDateString()?` – ${fmtShort(e.end)}`:""}
                          </div>
                          <div className="sans" style={{fontSize:11,color:"#8B7D6B"}}>
                            {fmtHrs(e.hours)} · {weekdays(e.start,e.end)} weekdays
                          </div>
                        </div>
                        <button onClick={()=>removeEntry(e.id)}
                          style={{background:"none",border:"none",color:"#B0A090",cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 4px"}}
                          onMouseEnter={ev=>ev.target.style.color="#CC4A1A"}
                          onMouseLeave={ev=>ev.target.style.color="#B0A090"}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Right: table */}
            <div className="panel" style={{overflow:"hidden"}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid #E8E0D0"}}>
                <span className="panel-title">Pay Period Detail</span>
              </div>
              <div style={{overflowY:"auto",maxHeight:520}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{position:"sticky",top:0,background:"#F5F0E8",zIndex:1}}>
                      {["Posts On","Accrued","Used","Balance"].map(h => (
                        <th key={h} style={{padding:"10px 16px",textAlign:h==="Posts On"?"left":"right",
                          fontFamily:"'Instrument Sans',sans-serif",fontSize:10,fontWeight:600,
                          letterSpacing:"0.08em",textTransform:"uppercase",color:"#8B7D6B",
                          borderBottom:"1px solid #D8D0C0",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {tablePeriods.map(p => (
                      <tr key={p.i} className="trow" style={{borderBottom:"1px solid #EDE8DC"}}>
                        <td style={{padding:"9px 16px",fontFamily:"'Instrument Sans',sans-serif",fontSize:12,color:"#4A3F30",whiteSpace:"nowrap"}}>
                          {fmtDate(p.date)}
                          {p.used>0 && <span style={{marginLeft:6,fontSize:9,color:"#8B6F47",background:"#EDE0CC",
                            borderRadius:3,padding:"1px 5px",fontWeight:600,letterSpacing:"0.05em"}}>TIME OFF</span>}
                        </td>
                        <td style={{padding:"9px 16px",textAlign:"right",fontFamily:"'Instrument Sans',sans-serif",fontSize:12,color:"#6B8B6B"}}>
                          +{fmtHrs(p.accrued)}</td>
                        <td style={{padding:"9px 16px",textAlign:"right",fontFamily:"'Instrument Sans',sans-serif",fontSize:12,
                          color:p.used>0?"#8B6F47":"#C8BFA8"}}>{p.used>0?`−${fmtHrs(p.used)}`:"—"}</td>
                        <td style={{padding:"9px 16px",textAlign:"right",fontFamily:"'Instrument Sans',sans-serif",fontSize:13,
                          fontWeight:600,color:p.balance<0?"#CC4A1A":"#1A1714"}}>{fmtHrs(p.balance)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {hasNextYear && (
                <div style={{padding:"12px 20px",borderTop:"1px solid #E8E0D0",textAlign:"center"}}>
                  <button className="btn btn-secondary" onClick={()=>setTableMaxYear(nextTableYear)}
                    style={{fontSize:11,padding:"7px 20px"}}>
                    Show {nextTableYear} ›
                  </button>
                </div>
              )}
            </div>

          </div>
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
